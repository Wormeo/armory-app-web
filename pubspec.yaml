name: armory_app
description: "A new Flutter project."
publish_to: 'none'
version: 2.4.0+20

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  http: ^1.1.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  firebase_crashlytics: ^4.0.2
  firebase_analytics: ^11.0.2
  firebase_core: ^3.1.1
  cached_network_image: ^3.3.1
  flutter_colorpicker: ^1.1.0
  animations: ^2.0.11
  in_app_purchase: ^3.2.0
  change_app_package_name: ^1.5.0
  connectivity_plus: ^7.0.0
  firebase_database: ^11.0.2
  app_links: ^6.3.2
  webview_flutter: ^4.13.1
  cloud_firestore: ^5.0.2
  device_preview: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^6.0.0
  firebase_core_platform_interface: ^6.0.2


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/ios.png"
  adaptive_icon_background: "assets/icon/ios.png"
  adaptive_icon_foreground: "assets/icon/ios.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#000000"
  image: assets/icon/back.png
  
  android_12:
    image: assets/icon/back.png
    color: "#000000"

  android: true
  ios: true
  fullscreen: true


flutter:
  uses-material-design: true

