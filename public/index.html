<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Armory | Tactical Uplink</title>
    <style>
      body { 
        background: #000; 
        color: #00FFFF; 
        font-family: 'Courier New', Courier, monospace; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
        text-align: center;
      }
      #status { border: 1px solid #00FFFF; padding: 20px; box-shadow: 0 0 15px #00FFFF; }
      .spinner { border: 3px solid rgba(0,255,255,0.3); border-top: 3px solid #00FFFF; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      a { color: #fff; text-decoration: underline; font-size: 11px; margin-top: 15px; display: block; opacity: 0.7; }
      .loading-text { font-size: 10px; margin-top: 10px; letter-spacing: 1px; }
    </style>
  </head>
  <body>

    <div id="status">
      <div class="spinner"></div>
      <h2 style="letter-spacing: 2px; margin-bottom: 5px;">SECURE UPLINK DETECTED</h2>
      <p id="msg" style="margin: 5px 0;">SYNCHRONIZING WITH OPTIPLEX-7040...</p>
      <div class="loading-text" id="timer">REDIRECTING IN 2.5s...</div>
      <div id="fallback"></div>
    </div>

    <script>
      window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
          const deepLink = "armoryapp://auth?code=" + code;
          
          // Show the fallback link immediately just in case
          document.getElementById('fallback').innerHTML = 
            `<a href="${deepLink}">[ MANUAL BYPASS ]</a>`;

          // DELAYED REDIRECT: 2500ms (2.5 seconds)
          setTimeout(() => {
            document.getElementById('msg').innerText = "INITIATING HANDSHAKE...";
            window.location.href = deepLink;
          }, 2500);

        } else {
          document.getElementById('msg').innerText = "NO TACTICAL CODE FOUND.";
          document.getElementById('timer').innerText = "VERIFICATION FAILED.";
          document.querySelector('.spinner').style.display = 'none';
        }
      }
    </script>
  </body>
</html>
